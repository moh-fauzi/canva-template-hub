<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>E-Catalog Templates</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="hero">
<h2>Template E-Catalog</h2>
<p>Browse all Canva templates like a digital catalog</p>
</div>

<section id="catalogContainer" class="grid"></section>

<script src="data.js"></script>

<script>
const container = document.getElementById("catalogContainer");

templates.forEach(template => {

let img = template.images[0];

container.innerHTML += `
<div class="card">

<div class="catalog-image">
<img src="${img}">
<span class="watermark">CanvaHub</span>
</div>

<h3>${template.title}</h3>
<p>${template.category}</p>

<a href="${template.link}" target="_blank">
<button>Use Template</button>
</a>

</div>
`;

});
</script>

</body>
</html>
